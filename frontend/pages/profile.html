            <!-- Desktop Sidebar Navigation -->

                        </svg>

                    </button>

                    <button class="nav-item" onclick="showSection('naadi-jyotish', event)">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>

                    <button class="nav-item" onclick="showSection('browse-centers', event)">

                            <rect x="14" y="14" width="7" height="7"/>

                        </svg>
                        <span>Browse Centers</span>
                    </button>

                    <div class="nav-divider"></div>

                    <!-- History & Volunteering Section -->

                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <span>Shibir History</span>
                    </button>

                    <button class="nav-item" onclick="showSection('volunteering', event)">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        <span>Volunteering Profile</span>
                    </button>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <div class="main-content-area">
                <div id="personal-section" class="content-section active"></div>
                <div id="settings-section" class="content-section"></div>
                <div id="sadhak-section" class="content-section"></div>
                <div id="enrolled-center-section" class="content-section"></div>
                <div id="browse-centers-section" class="content-section"></div>
                <div id="shibir-history-section" class="content-section"></div>
                <div id="volunteering-section" class="content-section"></div>
                <div id="naadi-jyotish-section" class="content-section"></div>
            </div>
        </div>
    </main>

    <!-- Mobile Drawer Navigation -->
    <div id="profile-drawer-overlay" class="profile-drawer-overlay"></div>
    <div id="profile-drawer" class="profile-drawer">
        <nav class="nav-menu">
            <button class="nav-item active" onclick="showSectionMobile('personal')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>My Profile</span>
            </button>

            <button class="nav-item" onclick="showSectionMobile('sadhak')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="16" rx="2"/>
                    <path d="M7 9h10M7 13h10M7 17h4"/>
                </svg>
                <span>Sadhak ID & Membership</span>
            </button>

            <button class="nav-item" onclick="showSectionMobile('settings')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-16.78 7.78l4.24-4.24m3.08-3.08l4.24-4.24"/>
                </svg>
                <span>Account Settings</span>
            </button>

            <button class="nav-item" onclick="showSectionMobile('naadi-jyotish')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                </svg>
                <span>Naadi Jyotish</span>
            </button>

            <div class="nav-divider"></div>

            <button class="nav-item" onclick="showSectionMobile('enrolled-center')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>My Enrolled Center</span>
            </button>

            <button class="nav-item" onclick="showSectionMobile('browse-centers')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                </svg>
                <span>Browse Centers</span>
            </button>

            <div class="nav-divider"></div>

            <button class="nav-item" onclick="showSectionMobile('shibir-history')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Shibir History</span>
            </button>

            <button class="nav-item" onclick="showSectionMobile('volunteering')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span>Volunteering Profile</span>
            </button>
        </nav>
    </div>

    <!-- Mobile Navigation FAB -->
    <button class="profile-nav-fab" onclick="toggleProfileDrawer()">☰ Menu</button>

    <!-- ═══════════════════════════════════════════════════════════════════════════ -->
    <!-- MODALS -->
    <!-- ═══════════════════════════════════════════════════════════════════════════ -->

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content modal-content-large">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <button class="close-btn" onclick="closeModal('editProfileModal')">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Content populated by personal.html component -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('editProfileModal')">Cancel</button>
                <button class="btn-confirm" onclick="saveProfile()">Save Profile</button>
            </div>
        </div>
    </div>

    <!-- Aadhaar Verification Modal -->
    <div id="aadhaarVerificationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Verify Aadhaar</h2>
                <button class="close-btn" onclick="closeModal('aadhaarVerificationModal')">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Content populated by personal.html component -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('aadhaarVerificationModal')">Cancel</button>
                <button class="btn-confirm" onclick="verifyAadhaarOTP()">Verify OTP</button>
            </div>
        </div>
    </div>

    <!-- Generic Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="confirm-title">Confirm Action</h2>
                <button class="close-btn" onclick="closeModal('confirmModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p class="confirm-message">Are you sure?</p>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('confirmModal')">Cancel</button>
                <button class="btn-confirm" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Edit Volunteering Modal -->
    <div id="editVolunteeringModal" class="modal">
        <div class="modal-content modal-content-large" style="max-width: 900px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2>Share Your Volunteering Profile</h2>
                <button class="close-btn" onclick="closeModal('editVolunteeringModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="volunteeringForm">
                    <!-- Professional Background -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Professional Background</div>
                        <div class="form-grid form-grid-2">
                            <div class="form-group">
                                <label>Current Occupation/Profession</label>
                                <input type="text" id="volOccupation" placeholder="E.g., Software Engineer, Teacher">
                            </div>
                            <div class="form-group">
                                <label>Years of Professional Experience</label>
                                <select id="volYearsExp"><option value="">Select...</option><option value="0-2">0-2 years</option><option value="3-5">3-5 years</option><option value="6-10">6-10 years</option><option value="11-20">11-20 years</option><option value="20+">20+ years</option></select>
                            </div>
                            <div class="form-group">
                                <label>Industry/Field of Expertise</label>
                                <input type="text" id="volIndustry" placeholder="E.g., Information Technology, Education">
                            </div>
                            <div class="form-group">
                                <label>Key Professional Skills</label>
                                <textarea id="volProfSkills" rows="2" placeholder="E.g., Project management, Public speaking..." maxlength="500"></textarea>
                                <small class="char-counter"><span id="volProfSkillsCount">0</span>/500</small>
                            </div>
                        </div>
                    </div>

                    <!-- Educational Background -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Educational Background</div>
                        <div class="form-grid form-grid-2">
                            <div class="form-group">
                                <label>Highest Level of Education</label>
                                <select id="volEducation"><option value="">Select...</option><option value="high-school">High School</option><option value="diploma">Diploma/Certificate</option><option value="bachelor">Bachelor's Degree</option><option value="master">Master's Degree</option><option value="phd">Doctoral Degree (PhD)</option></select>
                            </div>
                            <div class="form-group">
                                <label>Field of Study/Specialization</label>
                                <input type="text" id="volFieldOfStudy" placeholder="E.g., Philosophy, Computer Science">
                            </div>
                            <div class="form-group">
                                <label>Teaching/Training Experience</label>
                                <select id="volTeachingExp"><option value="">Select...</option><option value="none">No experience</option><option value="informal">Informal (family/friends)</option><option value="1-3">1-3 years</option><option value="4-10">4-10 years</option><option value="10+">10+ years professional</option></select>
                            </div>
                        </div>
                    </div>

                    <!-- Volunteer & Spiritual Experience -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Volunteer & Spiritual Experience</div>
                        <div class="form-group">
                            <label>Previous Volunteering Experience</label>
                            <textarea id="volPrevExp" rows="4" placeholder="Describe any previous volunteer work..." maxlength="1000"></textarea>
                            <small class="char-counter"><span id="volPrevExpCount">0</span>/1000</small>
                        </div>
                        <div class="form-group">
                            <label>Spiritual Practice Background</label>
                            <textarea id="volSpiritualBg" rows="3" placeholder="Share your spiritual journey, practices..." maxlength="500"></textarea>
                            <small class="char-counter"><span id="volSpiritualBgCount">0</span>/500</small>
                        </div>
                        <div class="form-group">
                            <label>Areas of Volunteer Interest (select all that apply)</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item"><input type="checkbox" id="volInt1" value="Teaching & Instruction"><label for="volInt1">Teaching & Instruction</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt2" value="Event Coordination & Management"><label for="volInt2">Event Coordination & Management</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt3" value="Content Creation"><label for="volInt3">Content Creation</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt4" value="Counseling & Guidance"><label for="volInt4">Counseling & Guidance</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt5" value="Administrative Support"><label for="volInt5">Administrative Support</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt6" value="Technology & Digital"><label for="volInt6">Technology & Digital</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt7" value="Translation Services"><label for="volInt7">Translation Services</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt8" value="Graphic Design & Creative Arts"><label for="volInt8">Graphic Design & Creative Arts</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt9" value="Center Coordination"><label for="volInt9">Center Coordination</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volInt10" value="Fundraising & Outreach"><label for="volInt10">Fundraising & Outreach</label></div>
                            </div>
                        </div>
                    </div>

                    <!-- Skills & Talents -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Skills & Talents</div>
                        <div class="form-group">
                            <label>Languages Spoken (select all that apply)</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item"><input type="checkbox" id="volLang1" value="English"><label for="volLang1">English (fluent)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volLang2" value="Hindi"><label for="volLang2">Hindi (fluent)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volLang3" value="Marathi"><label for="volLang3">Marathi (fluent)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volLang4" value="Sanskrit"><label for="volLang4">Sanskrit</label></div>
                            </div>
                            <div id="sanskritLevelGroup" style="display: none; margin-top: 1rem;">
                                <label>Sanskrit Level</label>
                                <select id="volSanskritLevel"><option value="">Select...</option><option value="basic">Basic</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Technical Skills (if applicable)</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item"><input type="checkbox" id="volTech1" value="Web Development"><label for="volTech1">Web Development</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTech2" value="Graphic Design"><label for="volTech2">Graphic Design</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTech3" value="Video Editing"><label for="volTech3">Video Editing</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTech4" value="Social Media Management"><label for="volTech4">Social Media Management</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTech5" value="Photography"><label for="volTech5">Photography</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTech6" value="Audio Production"><label for="volTech6">Audio Production</label></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Creative & Artistic Talents</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item"><input type="checkbox" id="volCreative1" value="Music"><label for="volCreative1">Music (vocal, instruments)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volCreative2" value="Writing"><label for="volCreative2">Writing (articles, blogs, poetry)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volCreative3" value="Visual Arts"><label for="volCreative3">Visual Arts (painting, sketching)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volCreative4" value="Performance Arts"><label for="volCreative4">Performance Arts (drama, storytelling)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volCreative5" value="Crafts & Handwork"><label for="volCreative5">Crafts & Handwork</label></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Management & Organizational Skills (if applicable)</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item"><input type="checkbox" id="volMgmt1" value="Project Management"><label for="volMgmt1">Project Management</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volMgmt2" value="Team Leadership"><label for="volMgmt2">Team Leadership</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volMgmt3" value="Event Planning"><label for="volMgmt3">Event Planning & Logistics</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volMgmt4" value="Budget Management"><label for="volMgmt4">Budget Management</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volMgmt5" value="Communications"><label for="volMgmt5">Communication & Public Relations</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volMgmt6" value="Training & Mentoring"><label for="volMgmt6">Training & Mentoring</label></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Additional Skills, Hobbies, or Unique Talents</label>
                            <textarea id="volAdditionalSkills" rows="3" placeholder="Share any other skills, hobbies, or talents not covered above..." maxlength="500"></textarea>
                            <small class="char-counter"><span id="volAdditionalSkillsCount">0</span>/500</small>
                        </div>
                    </div>

                    <!-- Availability & Commitment -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Availability & Commitment</div>
                        <div class="form-group">
                            <label>Hours Available Per Week</label>
                            <select id="volHours"><option value="">Select...</option><option value="1-2">1-2 hours</option><option value="3-5">3-5 hours</option><option value="6-10">6-10 hours</option><option value="11-20">11-20 hours</option><option value="20+">20+ hours</option></select>
                        </div>
                        <div class="form-group">
                            <label>Preferred Volunteering Days (select all that apply)</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item"><input type="checkbox" id="volDay1" value="Monday"><label for="volDay1">Monday</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volDay2" value="Tuesday"><label for="volDay2">Tuesday</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volDay3" value="Wednesday"><label for="volDay3">Wednesday</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volDay4" value="Thursday"><label for="volDay4">Thursday</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volDay5" value="Friday"><label for="volDay5">Friday</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volDay6" value="Saturday"><label for="volDay6">Saturday</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volDay7" value="Sunday"><label for="volDay7">Sunday</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volDay8" value="Flexible"><label for="volDay8">Flexible (any day)</label></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Preferred Time Slots</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item"><input type="checkbox" id="volTime1" value="Early Morning"><label for="volTime1">Early Morning (6am-9am)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTime2" value="Morning"><label for="volTime2">Morning (9am-12pm)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTime3" value="Afternoon"><label for="volTime3">Afternoon (12pm-4pm)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTime4" value="Evening"><label for="volTime4">Evening (4pm-8pm)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTime5" value="Night"><label for="volTime5">Night (8pm+)</label></div>
                                <div class="checkbox-item"><input type="checkbox" id="volTime6" value="Flexible"><label for="volTime6">Flexible (any time)</label></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Volunteering Format Preference</label>
                            <div class="radio-group">
                                <div class="radio-item"><input type="radio" id="volFormatInPerson" name="volFormat" value="In-Person"><label for="volFormatInPerson">In-Person</label></div>
                                <div class="radio-item"><input type="radio" id="volFormatRemote" name="volFormat" value="Remote"><label for="volFormatRemote">Remote/Online</label></div>
                                <div class="radio-item"><input type="radio" id="volFormatHybrid" name="volFormat" value="Hybrid"><label for="volFormatHybrid">Hybrid</label></div>
                                <div class="radio-item"><input type="radio" id="volFormatNoPreference" name="volFormat" value="No preference"><label for="volFormatNoPreference">No preference</label></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Willingness to Travel</label>
                            <div class="radio-group">
                                <div class="radio-item"><input type="radio" id="volTravelLocal" name="volTravel" value="local-only"><label for="volTravelLocal">Local only</label></div>
                                <div class="radio-item"><input type="radio" id="volTravelWithinCity" name="volTravel" value="within-city"><label for="volTravelWithinCity">Within city</label></div>
                                <div class="radio-item"><input type="radio" id="volTravelWithinState" name="volTravel" value="within-state"><label for="volTravelWithinState">Within state</label></div>
                                <div class="radio-item"><input type="radio" id="volTravelNational" name="volTravel" value="national"><label for="volTravelNational">National</label></div>
                            </div>
                            <div id="travelDistanceGroup" style="display: none; margin-top: 1rem;">
                                <label>Maximum Travel Distance (km)</label>
                                <input type="number" id="travelDistance" min="0" placeholder="E.g., 200">
                            </div>
                        </div>
                    </div>

                    <!-- Motivation & Goals -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Motivation & Goals</div>
                        <div class="form-group">
                            <label>Why do you want to volunteer?</label>
                            <textarea id="volMotivation" rows="5" placeholder="Share what motivates you to contribute..." maxlength="1000"></textarea>
                            <small class="char-counter"><span id="volMotivationCount">0</span>/1000</small>
                        </div>
                        <div class="form-group">
                            <label>What are your goals in volunteering?</label>
                            <textarea id="volGoals" rows="4" placeholder="What do you hope to gain or achieve..." maxlength="800"></textarea>
                            <small class="char-counter"><span id="volGoalsCount">0</span>/800</small>
                        </div>
                        <div class="form-group">
                            <label>Special Projects You'd Like to Contribute To</label>
                            <textarea id="volSpecialProjects" rows="3" placeholder="Specific programs or initiatives you're interested in..." maxlength="500"></textarea>
                            <small class="char-counter"><span id="volSpecialProjectsCount">0</span>/500</small>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('editVolunteeringModal')">Cancel</button>
                <button class="btn-confirm" onclick="saveVolunteeringProfile()">Save Profile</button>
            </div>
        </div>
    </div>

    <!-- Footer (injected by main.js) -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script>
        window.ROOT_PATH = '../';
    </script>
    <script src="../js/tailwind-config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
