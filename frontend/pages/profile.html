<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AntarYog Foundation</title>

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">

    <!-- Profile-Specific Styles -->
    <link rel="stylesheet" href="../css/profile.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Navigation (injected by main.js) -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <main>
        <div class="profile-main-container">

            <!-- Desktop Sidebar Navigation -->
            <aside class="left-sidebar">
                <button class="nav-item active" onclick="showSection('personal', event)">My Profile</button>
                <button class="nav-item" onclick="showSection('settings', event)">Account Settings</button>
                <button class="nav-item" onclick="showSection('sadhak', event)">Sadhak ID & Membership</button>
                <button class="nav-item" onclick="showSection('enrolled-center', event)">Enrolled Center</button>
                <button class="nav-item" onclick="showSection('browse-centers', event)">Browse Centers</button>
                <button class="nav-item" onclick="showSection('shibir-history', event)">Shibir History</button>
                <button class="nav-item" onclick="showSection('volunteering', event)">Volunteering</button>
                <button class="nav-item" onclick="showSection('naadi-jyotish', event)">Naadi Jyotish</button>
            </aside>

            <!-- Main Content Area -->
            <div class="main-content-area">
                <div id="personal-section" class="content-section active"></div>
                <div id="settings-section" class="content-section"></div>
                <div id="sadhak-section" class="content-section"></div>
                <div id="enrolled-center-section" class="content-section"></div>
                <div id="browse-centers-section" class="content-section"></div>
                <div id="shibir-history-section" class="content-section"></div>
                <div id="volunteering-section" class="content-section"></div>
                <div id="naadi-jyotish-section" class="content-section"></div>
            </div>
        </div>
    </main>

    <!-- Mobile Drawer Navigation -->
    <div id="profile-drawer-overlay" class="profile-drawer-overlay"></div>
    <div id="profile-drawer" class="profile-drawer">
        <button class="nav-item active" onclick="showSectionMobile('personal')">My Profile</button>
        <button class="nav-item" onclick="showSectionMobile('settings')">Account Settings</button>
        <button class="nav-item" onclick="showSectionMobile('sadhak')">Sadhak ID & Membership</button>
        <button class="nav-item" onclick="showSectionMobile('enrolled-center')">Enrolled Center</button>
        <button class="nav-item" onclick="showSectionMobile('browse-centers')">Browse Centers</button>
        <button class="nav-item" onclick="showSectionMobile('shibir-history')">Shibir History</button>
        <button class="nav-item" onclick="showSectionMobile('volunteering')">Volunteering</button>
        <button class="nav-item" onclick="showSectionMobile('naadi-jyotish')">Naadi Jyotish</button>
    </div>

    <!-- Mobile Navigation FAB -->
    <button class="profile-nav-fab" onclick="toggleProfileDrawer()">☰ Menu</button>

    <!-- ═══════════════════════════════════════════════════════════════════════════ -->
    <!-- MODALS -->
    <!-- ═══════════════════════════════════════════════════════════════════════════ -->

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content modal-content-large">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <button class="close-btn" onclick="closeModal('editProfileModal')">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Content populated by personal.html component -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('editProfileModal')">Cancel</button>
                <button class="btn-confirm" onclick="saveProfile()">Save Profile</button>
            </div>
        </div>
    </div>

    <!-- Aadhaar Verification Modal -->
    <div id="aadhaarVerificationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Verify Aadhaar</h2>
                <button class="close-btn" onclick="closeModal('aadhaarVerificationModal')">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Content populated by personal.html component -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('aadhaarVerificationModal')">Cancel</button>
                <button class="btn-confirm" onclick="verifyAadhaarOTP()">Verify OTP</button>
            </div>
        </div>
    </div>

    <!-- Generic Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="confirm-title">Confirm Action</h2>
                <button class="close-btn" onclick="closeModal('confirmModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p class="confirm-message">Are you sure?</p>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('confirmModal')">Cancel</button>
                <button class="btn-confirm" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Edit Volunteering Modal -->
    <div id="editVolunteeringModal" class="modal">
        <div class="modal-content modal-content-large" style="max-width: 900px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2>Share Your Volunteering Profile</h2>
                <button class="close-btn" onclick="closeModal('editVolunteeringModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="volunteeringForm">
                    <!-- Professional Background -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Professional Background</div>
                        <div class="form-grid form-grid-2">
                            <div class="form-group">
                                <label>Current Occupation/Profession</label>
                                <input type="text" id="volOccupation" placeholder="E.g., Software Engineer, Teacher">
                            </div>
                            <div class="form-group">
                                <label>Years of Professional Experience</label>
                                <select id="volYearsExp"><option value="">Select...</option><option value="0-2">0-2 years</option><option value="3-5">3-5 years</option><option value="6-10">6-10 years</option><option value="11-20">11-20 years</option><option value="20+">20+ years</option></select>
                            </div>
                            <div class="form-group">
                                <label>Industry/Field of Expertise</label>
                                <input type="text" id="volIndustry" placeholder="E.g., Information Technology, Education">
                            </div>
                            <div class="form-group">
                                <label>Key Professional Skills</label>
                                <textarea id="volProfSkills" rows="2" placeholder="E.g., Project management, Public speaking..." maxlength="500"></textarea>
                                <small class="char-counter"><span id="volProfSkillsCount">0</span>/500</small>
                            </div>
                        </div>
                    </div>

                    <!-- Educational Background -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Educational Background</div>
                        <div class="form-grid form-grid-2">
                            <div class="form-group">
                                <label>Highest Level of Education</label>
                                <select id="volEducation"><option value="">Select...</option><option value="high-school">High School</option><option value="diploma">Diploma/Certificate</option><option value="bachelor">Bachelor's Degree</option><option value="master">Master's Degree</option><option value="phd">Doctoral Degree (PhD)</option></select>
                            </div>
                            <div class="form-group">
                                <label>Field of Study/Specialization</label>
                                <input type="text" id="volFieldOfStudy" placeholder="E.g., Philosophy, Computer Science">
                            </div>
                            <div class="form-group">
                                <label>Teaching/Training Experience</label>
                                <select id="volTeachingExp"><option value="">Select...</option><option value="none">No experience</option><option value="informal">Informal (family/friends)</option><option value="1-3">1-3 years</option><option value="4-10">4-10 years</option><option value="10+">10+ years professional</option></select>
                            </div>
                        </div>
                    </div>

                    <!-- Volunteer & Spiritual Experience -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Volunteer & Spiritual Experience</div>
                        <div class="form-group">
                            <label>Previous Volunteering Experience</label>
                            <textarea id="volPrevExp" rows="4" placeholder="Describe any previous volunteer work..." maxlength="1000"></textarea>
                            <small class="char-counter"><span id="volPrevExpCount">0</span>/1000</small>
                        </div>
                        <div class="form-group">
                            <label>Spiritual Practice Background</label>
                            <textarea id="volSpiritualBg" rows="3" placeholder="Share your spiritual journey, practices..." maxlength="500"></textarea>
                            <small class="char-counter"><span id="volSpiritualBgCount">0</span>/500</small>
                        </div>
                        <div class="form-group">
                            <label>Areas of Volunteer Interest (select all that apply)</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volInt1" value="Teaching & Instruction"> Teaching & Instruction</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volInt2" value="Event Coordination & Management"> Event Coordination</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volInt3" value="Content Creation"> Content Creation</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volInt4" value="Administrative Support"> Administrative Support</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volInt5" value="Technology & Digital"> Technology & Digital</label>
                                <label style="display: inline-flex;"><input type="checkbox" id="volInt6" value="Translation Services"> Translation Services</label>
                            </div>
                        </div>
                    </div>

                    <!-- Skills & Talents -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Skills & Talents</div>
                        <div class="form-group">
                            <label>Languages Spoken (select all that apply)</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volLang1" value="English"> English (fluent)</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volLang2" value="Hindi"> Hindi (fluent)</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volLang3" value="Marathi"> Marathi (fluent)</label>
                                <label style="display: inline-flex;"><input type="checkbox" id="volLang4" value="Sanskrit"> Sanskrit</label>
                            </div>
                            <div id="sanskritLevelGroup" style="display: none; margin-top: 1rem;">
                                <label>Sanskrit Level</label>
                                <select id="volSanskritLevel"><option value="">Select...</option><option value="basic">Basic</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Technical Skills (if applicable)</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volTech1" value="Web Development"> Web Development</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volTech2" value="Graphic Design"> Graphic Design</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volTech3" value="Video Editing"> Video Editing</label>
                                <label style="display: inline-flex;"><input type="checkbox" id="volTech4" value="Social Media Management"> Social Media</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Creative & Artistic Talents</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volCreative1" value="Music"> Music</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volCreative2" value="Writing"> Writing</label>
                                <label style="display: inline-flex;"><input type="checkbox" id="volCreative3" value="Visual Arts"> Visual Arts</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Additional Skills</label>
                            <textarea id="volAdditionalSkills" rows="3" placeholder="Share any other skills or talents..." maxlength="500"></textarea>
                            <small class="char-counter"><span id="volAdditionalSkillsCount">0</span>/500</small>
                        </div>
                    </div>

                    <!-- Availability & Commitment -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Availability & Commitment</div>
                        <div class="form-group">
                            <label>Hours Available Per Week</label>
                            <select id="volHours"><option value="">Select...</option><option value="1-2">1-2 hours</option><option value="3-5">3-5 hours</option><option value="6-10">6-10 hours</option><option value="11-20">11-20 hours</option><option value="20+">20+ hours</option></select>
                        </div>
                        <div class="form-group">
                            <label>Preferred Days (select all that apply)</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volDay1" value="Monday"> Monday</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volDay2" value="Tuesday"> Tuesday</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volDay3" value="Wednesday"> Wednesday</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volDay4" value="Thursday"> Thursday</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volDay5" value="Friday"> Friday</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volDay6" value="Saturday"> Saturday</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volDay7" value="Sunday"> Sunday</label>
                                <label style="display: inline-flex;"><input type="checkbox" id="volDay8" value="Flexible"> Flexible</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Preferred Time Slots</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volTime1" value="Early Morning"> Early Morning (6am-9am)</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volTime2" value="Morning"> Morning (9am-12pm)</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volTime3" value="Afternoon"> Afternoon (12pm-4pm)</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="checkbox" id="volTime4" value="Evening"> Evening (4pm-8pm)</label>
                                <label style="display: inline-flex;"><input type="checkbox" id="volTime5" value="Night"> Night (8pm+)</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Volunteering Format Preference</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="radio" name="volFormat" value="In-Person"> In-Person</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="radio" name="volFormat" value="Remote"> Remote/Online</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="radio" name="volFormat" value="Hybrid"> Hybrid</label>
                                <label style="display: inline-flex;"><input type="radio" name="volFormat" value="No preference"> No preference</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Willingness to Travel</label>
                            <div class="checkbox-group">
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="radio" name="volTravel" value="within-city"> Within city</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="radio" name="volTravel" value="within-state"> Within state</label>
                                <label style="display: inline-flex; margin-right: 1rem;"><input type="radio" name="volTravel" value="national"> National</label>
                                <label style="display: inline-flex;"><input type="radio" name="volTravel" value="local-only"> Local only</label>
                            </div>
                            <div id="travelDistanceGroup" style="display: none; margin-top: 1rem;">
                                <label>Maximum Travel Distance (km)</label>
                                <input type="number" id="travelDistance" min="0" placeholder="E.g., 200">
                            </div>
                        </div>
                    </div>

                    <!-- Motivation & Goals -->
                    <div class="modal-field-group">
                        <div class="modal-group-title">Motivation & Goals</div>
                        <div class="form-group">
                            <label>Why do you want to volunteer?</label>
                            <textarea id="volMotivation" rows="5" placeholder="Share what motivates you to contribute..." maxlength="1000"></textarea>
                            <small class="char-counter"><span id="volMotivationCount">0</span>/1000</small>
                        </div>
                        <div class="form-group">
                            <label>What are your goals in volunteering?</label>
                            <textarea id="volGoals" rows="4" placeholder="What do you hope to gain or achieve..." maxlength="800"></textarea>
                            <small class="char-counter"><span id="volGoalsCount">0</span>/800</small>
                        </div>
                        <div class="form-group">
                            <label>Special Projects You'd Like to Contribute To</label>
                            <textarea id="volSpecialProjects" rows="3" placeholder="Specific programs or initiatives you're interested in..." maxlength="500"></textarea>
                            <small class="char-counter"><span id="volSpecialProjectsCount">0</span>/500</small>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('editVolunteeringModal')">Cancel</button>
                <button class="btn-confirm" onclick="saveVolunteeringProfile()">Save Profile</button>
            </div>
        </div>
    </div>

    <!-- Footer (injected by main.js) -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script>
        window.ROOT_PATH = '../';
    </script>
    <script src="../js/tailwind-config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
