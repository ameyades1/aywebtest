<div class="section-header">
    <h1 class="section-title">My Enrolled Center</h1>
</div>

<div class="enrolled-center">
    <div class="center-header">
        <div class="center-name">
            <h3>Andheri Spiritual Center</h3>
            <p>Andheri West, Mumbai, Maharashtra</p>
        </div>
        <span class="enrolled-badge">Enrolled</span>
    </div>

    <div class="center-grid">
        <div class="center-info">
            <div class="center-info-label">Meeting Schedule</div>
            <div class="center-info-value">Every Sunday<br>10:00 AM</div>
        </div>
        <div class="center-info">
            <div class="center-info-label">Active Members</div>
            <div class="center-info-value">45</div>
        </div>
        <div class="center-info">
            <div class="center-info-label">Coordinator</div>
            <div class="center-info-value">Rajesh Kumar</div>
        </div>
    </div>

    <div class="next-meeting-box">
        <div class="next-meeting-label">Next Upcoming Meeting</div>
        <div class="next-meeting-value">Sunday, April 13, 2026 at 10:00 AM</div>
    </div>

    <div class="center-actions">
        <button class="btn-primary" onclick="viewCenterDetails()">View Details</button>
        <button class="btn-secondary" onclick="openDirections()">Get Directions</button>
        <button class="btn-danger" onclick="leaveCenter()">Leave Center</button>
    </div>
</div>
