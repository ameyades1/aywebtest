<div class="section-header">
    <h1 class="section-title">Account Settings</h1>
</div>

<div class="content-card">
    <div class="form-group">
        <label>Account Status</label>
        <input type="text" value="Active" disabled style="color: #10b981; font-weight: 600;">
    </div>

    <div class="form-group">
        <label>Member Since</label>
        <input type="text" value="February 1, 2024" disabled>
    </div>

    <div style="margin-bottom: 1.25rem;">
        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text); margin-bottom: 0.75rem;">Email Notifications</label>
        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            <input type="checkbox" checked> Enable email notifications
        </label>
    </div>

    <div style="margin-bottom: 1.25rem;">
        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text); margin-bottom: 0.75rem;">SMS Notifications</label>
        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            <input type="checkbox" checked> Enable SMS notifications
        </label>
    </div>
</div>
