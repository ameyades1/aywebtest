<div class="section-header">
    <div>
        <h1 class="section-title">Naadi Jyotish</h1>
        <p style="font-size: 0.95rem; color: var(--text-secondary); margin-top: 0.5rem;">Your astrological profile and consultation history</p>
    </div>
</div>

<!-- Birth Profile Card -->
<div class="naadi-birth-profile">
    <div class="naadi-profile-header">
        <div class="naadi-profile-title">
            <img src="../assets/icons/star.svg" alt="" class="naadi-profile-icon">
            <h3>Birth Profile</h3>
        </div>
        <div class="header-divider"></div>
        <div class="astrological-details">
            <div class="astro-badge">
                <div class="astro-badge-label">Rashi</div>
                <div class="astro-badge-value" id="userRashi">-</div>
            </div>
            <div class="astro-badge">
                <div class="astro-badge-label">Nakshatra</div>
                <div class="astro-badge-value" id="userNakshatra">-</div>
            </div>
        </div>
        <button class="btn-download-patrika" onclick="downloadPatrika()">
            <img src="../assets/icons/download.svg" alt="" width="16" height="16">
            Download Patrika
        </button>
    </div>

    <!-- Birth Details Grid -->
    <div class="birth-details-grid" id="birthDetailsGrid">
        <!-- Dynamically populated by renderNaadiBirthProfile() -->
    </div>
</div>

<!-- Upcoming Consultations -->
<div style="margin-bottom: 2rem; margin-top: 2rem;">
    <h3 style="font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; font-family: 'Lora', serif;">Upcoming Consultations</h3>
    <div id="upcomingConsultationsContent"></div>
</div>

<hr style="border: none; border-top: 1px solid #e5e7eb; margin: 2rem 0;">

<!-- Consultation History -->
<div>
    <h3 style="font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; font-family: 'Lora', serif;">Consultation History</h3>
    <div id="consultationsContent">
        <!-- Dynamically populated by renderNaadiConsultations() -->
    </div>
</div>
