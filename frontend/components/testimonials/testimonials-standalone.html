<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntarYog Testimonials - Transformations Through Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #2C1810;
            background: #F9F6F0;
        }

        /* ============================================
           TESTIMONIALS SECTION
           ============================================ */

        .testimonials-scroll-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #F9F6F0 0%, #FBF8F3 50%, #F6F2EB 100%);
            padding: 120px 0;
            overflow: hidden;
        }

        .testimonials-header {
            text-align: center;
            margin-bottom: 80px;
            animation: fadeInUp 0.8s ease-out;
        }

        .testimonials-header h2 {
            font-family: 'Lora', serif;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #5C3010;
            margin-bottom: 16px;
        }

        .testimonials-subtitle {
            font-size: 1.125rem;
            color: #6B4423;
            font-weight: 400;
            letter-spacing: 0.3px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Container */
        .testimonials-container {
            position: relative;
            width: 100%;
            max-width: 100%;
        }

        .testimonials-scroll-track {
            display: flex;
            gap: 32px;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding: 60px;
            max-width: 1400px;
            margin: 0 auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .testimonials-scroll-track::-webkit-scrollbar {
            display: none;
        }

        /* Card */
        .testimonial-card {
            flex: 0 0 100%;
            max-width: calc(100% - 32px);
            background: linear-gradient(135deg, #FFFFFF 0%, rgba(184, 115, 51, 0.01) 100%);
            border: 1px solid #D4C4B0;
            padding: 60px 48px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(92, 48, 16, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 500px;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.6s ease-out;
            transition: all 0.4s cubic-bezier(0.2, 0.6, 0.3, 1);
        }

        .testimonial-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(232, 184, 75, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .testimonial-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(184, 115, 51, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .testimonial-card:hover {
            box-shadow: 0 8px 24px rgba(92, 48, 16, 0.12);
            border-color: #B87333;
            transform: translateY(-4px);
        }

        /* Quote */
        .quote-mark {
            font-family: 'Lora', serif;
            font-size: 5rem;
            color: #E8B84B;
            opacity: 0.3;
            position: relative;
            z-index: 1;
            line-height: 1;
            margin-bottom: 8px;
        }

        .quote-text {
            font-family: 'Lora', serif;
            font-size: clamp(1.5rem, 3vw, 2rem);
            line-height: 1.5;
            color: #2C1810;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
        }

        /* Footer */
        .testimonial-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 24px;
            position: relative;
            z-index: 1;
            border-top: 1px solid #D4C4B0;
            padding-top: 32px;
        }

        .speaker-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .speaker-name {
            font-family: 'Lora', serif;
            font-size: 1.125rem;
            font-weight: 600;
            color: #5C3010;
            letter-spacing: -0.01em;
        }

        .speaker-category {
            font-size: 0.875rem;
            color: #6B4423;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 500;
        }

        .achievement-badge {
            display: inline-block;
            font-size: 0.8rem;
            color: #B87333;
            background: rgba(184, 115, 51, 0.08);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(184, 115, 51, 0.2);
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        /* Navigation */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: 1px solid #D4C4B0;
            background: #FFFFFF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            color: #5C3010;
            transition: all 0.3s cubic-bezier(0.2, 0.6, 0.3, 1);
            box-shadow: 0 2px 8px rgba(92, 48, 16, 0.08);
        }

        .nav-arrow:hover {
            background: #B87333;
            color: #FFFFFF;
            box-shadow: 0 8px 24px rgba(92, 48, 16, 0.12);
            border-color: #B87333;
        }

        .nav-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }

        .nav-arrow-left {
            left: 20px;
        }

        .nav-arrow-right {
            right: 20px;
        }

        /* Dots */
        .testimonials-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 60px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid #B87333;
            background: transparent;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.6, 0.3, 1);
        }

        .dot:hover {
            transform: scale(1.2);
        }

        .dot.active {
            background: #B87333;
            width: 32px;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(184, 115, 51, 0.3);
        }

        /* Counter */
        .testimonials-counter {
            text-align: center;
            margin-top: 40px;
            font-size: 0.875rem;
            color: #6B4423;
            letter-spacing: 1px;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .current {
            color: #B87333;
            font-weight: 600;
        }

        .divider {
            margin: 0 8px;
            opacity: 0.5;
        }

        .total {
            opacity: 0.7;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .testimonials-scroll-section {
                padding: 80px 0;
            }

            .testimonials-header {
                margin-bottom: 60px;
            }

            .testimonial-card {
                flex: 0 0 90vw;
                max-width: 90vw;
                padding: 40px 32px;
                min-height: 400px;
            }

            .quote-text {
                font-size: 1.25rem;
                margin-bottom: 32px;
            }

            .testimonials-scroll-track {
                padding: 40px;
                gap: 20px;
            }

            .testimonial-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .achievement-badge {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .testimonial-card {
                flex: 0 0 100vw;
                max-width: 100vw;
                padding: 32px 24px;
                min-height: 380px;
            }

            .quote-text {
                font-size: 1.125rem;
                margin-bottom: 24px;
            }

            .quote-mark {
                font-size: 2.5rem;
            }

            .nav-arrow {
                width: 36px;
                height: 36px;
            }

            .testimonials-scroll-track {
                padding: 32px 0;
            }
        }
    </style>
</head>
<body>
    <section class="testimonials-scroll-section">
        <div class="testimonials-header">
            <h2>Transformations Through Practice</h2>
            <p class="testimonials-subtitle">Real stories from seekers who found clarity and growth</p>
        </div>

        <div class="testimonials-container">
            <div class="testimonials-scroll-track" id="scrollTrack">
                <!-- Testimonials will be inserted here by JavaScript -->
            </div>

            <button class="nav-arrow nav-arrow-left" id="prevBtn" aria-label="Previous testimonial">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M15 19L8 12l7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>

            <button class="nav-arrow nav-arrow-right" id="nextBtn" aria-label="Next testimonial">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M9 19l7-7-7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <div class="testimonials-dots" id="dotsContainer"></div>

        <div class="testimonials-counter">
            <span class="current" id="currentCounter">01</span>
            <span class="divider">/</span>
            <span class="total" id="totalCounter">06</span>
        </div>
    </section>

    <script>
        const testimonials = [
            {
                quote: "When we do Guru Kya with all our heart, the things that actually could never happen do manifest automatically.",
                speaker: "Pramesh Ala",
                category: "Career & Prosperity",
                achievement: "Executive promoted to Director"
            },
            {
                quote: "Due to Guru's grace, I have undergone so much transformation that even those who practice yoga, meditation, etc. for 20 years would not have achieved this much.",
                speaker: "Chinmay Prabhu Ghat",
                category: "Relationships",
                achievement: "Sibling rivalry transformed to love in 2 years"
            },
            {
                quote: "For Sadguru, a moment is enough to bring about transformation.",
                speaker: "Chinmay Prabhu Ghat",
                category: "Spiritual Growth",
                achievement: "Rapid inner transformation through guidance"
            },
            {
                quote: "A huge transformation took place when I attended the Durga Saptashati camp during Navratri and learned about relationships from the Bhagavad Gita through Guruji's teachings.",
                speaker: "Chinmay Prabhu Ghat",
                category: "Spiritual Learning",
                achievement: "Understanding of relationships shifted"
            },
            {
                quote: "The knowledge in Antar Yoga is that which cannot be found anywhere else in the world.",
                speaker: "Seeker",
                category: "Spiritual Wisdom",
                achievement: "Discovered unique spiritual knowledge"
            },
            {
                quote: "Every word from a living guru transforms your life.",
                speaker: "Devotee",
                category: "Spiritual Path",
                achievement: "Life transformed through guru's guidance"
            }
        ];

        let currentIndex = 0;
        let isAutoScroll = true;

        function renderTestimonials() {
            const scrollTrack = document.getElementById('scrollTrack');
            const dotsContainer = document.getElementById('dotsContainer');

            testimonials.forEach((testimonial, index) => {
                const card = document.createElement('div');
                card.className = 'testimonial-card';
                card.innerHTML = `
                    <div>
                        <div class="quote-mark">"</div>
                        <p class="quote-text">${testimonial.quote}</p>
                    </div>
                    <div class="testimonial-footer">
                        <div class="speaker-info">
                            <h4 class="speaker-name">${testimonial.speaker}</h4>
                            <span class="speaker-category">${testimonial.category}</span>
                        </div>
                        <span class="achievement-badge">${testimonial.achievement}</span>
                    </div>
                `;
                scrollTrack.appendChild(card);

                const dot = document.createElement('button');
                dot.className = `dot ${index === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToSlide(index));
                dotsContainer.appendChild(dot);
            });

            document.getElementById('totalCounter').textContent = String(testimonials.length).padStart(2, '0');
        }

        function goToSlide(index) {
            isAutoScroll = false;
            currentIndex = index;
            updateSlide();
        }

        function updateSlide() {
            const scrollTrack = document.getElementById('scrollTrack');
            const targetScroll = currentIndex * scrollTrack.clientWidth;
            scrollTrack.scrollTo({ left: targetScroll, behavior: 'smooth' });

            document.querySelectorAll('.dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });

            document.getElementById('currentCounter').textContent = String(currentIndex + 1).padStart(2, '0');
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            isAutoScroll = false;
            currentIndex = (currentIndex - 1 + testimonials.length) % testimonials.length;
            updateSlide();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            isAutoScroll = false;
            currentIndex = (currentIndex + 1) % testimonials.length;
            updateSlide();
        });

        setInterval(() => {
            if (isAutoScroll) {
                currentIndex = (currentIndex + 1) % testimonials.length;
                updateSlide();
            }
        }, 8000);

        renderTestimonials();
    </script>
</body>
</html>
