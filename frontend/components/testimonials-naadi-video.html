<!-- Video Testimonials Carousel — Naadi Jyotish Page -->
<div class="video-testimonials-section">
  <div class="video-testimonials-wrapper">
    <!-- Prev arrow -->
    <button class="video-tcard-arrow video-tcard-arrow--prev" id="video-tcard-prev" aria-label="Previous video testimonial">
      <img src="../assets/icons/chevron-left.svg" alt="" width="18" height="18">
    </button>

    <!-- Scroll track -->
    <div class="video-testimonials-track-outer" id="video-testimonials-track-outer">
      <div class="video-testimonials-track" id="video-testimonials-track">
        <!-- Video cards will be inserted here -->
      </div>
    </div>

    <!-- Next arrow -->
    <button class="video-tcard-arrow video-tcard-arrow--next" id="video-tcard-next" aria-label="Next video testimonial">
      <img src="../assets/icons/chevron-right.svg" alt="" width="18" height="18">
    </button>
  </div>

  <!-- Dots -->
  <div class="video-testimonials-dots" id="video-testimonials-dots"></div>
</div>

<!-- Video Lightbox Modal -->
<div class="video-lightbox" id="video-lightbox" style="display: none;">
  <div class="video-lightbox__overlay"></div>
  <div class="video-lightbox__container">
    <button class="video-lightbox__close" id="video-lightbox-close" aria-label="Close video">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="video-lightbox__player" id="video-lightbox-player"></div>
  </div>
</div>
