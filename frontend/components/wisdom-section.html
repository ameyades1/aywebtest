<!-- Wisdom on the Web Section -->
<section class="wisdom-section">
    <div class="container px-4 lg:px-8">
        <!-- Section Header -->
        <div class="wisdom-header">
            <h2 class="wisdom-title">Antar Yog on the Web</h2>
        </div>

        <!-- Carousel -->
        <div class="wisdom-carousel-wrapper">

            <!-- Prev arrow -->
            <button class="wcard-arrow wcard-arrow--prev" id="wisdom-prev" aria-label="Previous video">
                <img src="assets/icons/chevron-left.svg" alt="" width="20" height="20" class="wcard-arrow-icon">
            </button>

            <!-- Scrollable track -->
            <div class="wisdom-track-outer" id="wisdom-track-outer">
                <div class="wisdom-track" id="wisdom-track">
                    <!-- Cards loaded via loadWisdomVideos() in main.js -->
                </div>
            </div>

            <!-- Next arrow -->
            <button class="wcard-arrow wcard-arrow--next" id="wisdom-next" aria-label="Next video">
                <img src="assets/icons/chevron-right.svg" alt="" width="20" height="20" class="wcard-arrow-icon">
            </button>

        </div>

        <!-- Dots -->
        <div class="wisdom-dots" id="wisdom-dots">
            <button class="wdot active" data-index="0" aria-label="Video 1"></button>
            <button class="wdot" data-index="1" aria-label="Video 2"></button>
            <button class="wdot" data-index="2" aria-label="Video 3"></button>
            <button class="wdot" data-index="3" aria-label="Video 4"></button>
            <button class="wdot" data-index="4" aria-label="Video 5"></button>
            <button class="wdot" data-index="5" aria-label="Video 6"></button>
        </div>

        <!-- Footer CTA -->
        <div class="wisdom-footer">
            <p class="wisdom-follow-text">Follow us on</p>
            <div class="wisdom-social-icons">
                <div class="wisdom-social-item">
                    <a href="#" target="_blank" rel="noopener" class="wisdom-social-link" aria-label="Facebook">
                        <img src="assets/icons/facebook.svg" alt="" class="wisdom-social-icon">
                    </a>
                    <span class="wisdom-social-label">Facebook</span>
                </div>
                <div class="wisdom-social-item">
                    <a href="https://www.instagram.com/antaryogfoundation/" target="_blank" rel="noopener" class="wisdom-social-link" aria-label="Instagram">
                        <img src="assets/icons/instagram.svg" alt="" class="wisdom-social-icon">
                    </a>
                    <span class="wisdom-social-label">Instagram</span>
                </div>
                <div class="wisdom-social-item">
                    <a href="https://www.youtube.com/@AntarYogFoundationOfficial" target="_blank" rel="noopener" class="wisdom-social-link" aria-label="YouTube">
                        <img src="assets/icons/youtube.svg" alt="" class="wisdom-social-icon">
                    </a>
                    <span class="wisdom-social-label">YouTube</span>
                </div>
                <div class="wisdom-social-item">
                    <a href="https://t.me/joinchat/VBi97BI7AsguLzON" target="_blank" rel="noopener" class="wisdom-social-link" aria-label="Telegram">
                        <img src="assets/icons/telegram.svg" alt="" class="wisdom-social-icon">
                    </a>
                    <span class="wisdom-social-label">Telegram</span>
                </div>
            </div>
        </div>

    </div>
</section>
