<section class="text-testimonials-section">
  <div class="text-testimonials-wrapper">
    <!-- Prev arrow -->
    <button class="text-tcard-arrow text-tcard-arrow--prev" id="text-tcard-prev" aria-label="Previous testimonial">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <!-- Scroll track -->
    <div class="text-testimonials-track-outer" id="text-testimonials-track-outer">
      <div class="text-testimonials-track" id="text-testimonials-track">
        <!-- Cards will be inserted here -->
      </div>
    </div>

    <!-- Next arrow -->
    <button class="text-tcard-arrow text-tcard-arrow--next" id="text-tcard-next" aria-label="Next testimonial">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>

  <!-- Dots -->
  <div class="text-testimonials-dots" id="text-testimonials-dots"></div>
</section>
