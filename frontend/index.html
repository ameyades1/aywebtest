<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Antar Yog</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/transformations.css">
    <link rel="stylesheet" href="css/wireframe.css">
    <link rel="stylesheet" href="css/testimonials.css">
    <link rel="stylesheet" href="css/programs.css">
    <link rel="stylesheet" href="css/courses-preview.css">
    <link rel="stylesheet" href="css/how-it-works.css">
    <link rel="stylesheet" href="css/guru.css">
    <link rel="stylesheet" href="css/wisdom-section.css">
    <link rel="stylesheet" href="css/final-cta.css">
    <link rel="stylesheet" href="css/upcoming-programs.css">
    <link rel="stylesheet" href="css/testimonials-scroll.css">
</head>

<body>
    <!-- Header -->
    <div id="navbar"></div>

    <!-- Main Content (9 Wireframe Sections) -->
    <main class="wireframe-container">

        <!-- Section 1: Hero (real component) -->
        <div id="hero"></div>

        <!-- Section 2: Life Transformations (real component) -->
        <div id="transformations"></div>

        <!-- Section 3: How It Works / Shibir CTA (real component) -->
        <div id="how-it-works"></div>

        <!-- Section 4: Saadhak Stories (Testimonials) -->
        <div id="testimonials"></div>

        <!-- Section 4.5: Programs for Everyone (real component) -->
        <div id="programs"></div>

        <!-- Section 5: Courses Preview (real component) -->
        <div id="courses-preview"></div>

        <!-- Section 6: Upcoming Programs (real component) -->
        <div id="upcoming-programs"></div>

        <!-- Section 7: Text Testimonials - Scrollable Carousel -->
        <div id="text-testimonials"></div>

        <!-- Section 8: Guru / Lineage (real component) -->
        <div id="guru"></div>

        <!-- Section 8.5: Wisdom on the Web (real component) -->
        <div id="wisdom-section"></div>

        <!-- Section 9: Final CTA (real component) -->
        <div id="final-cta"></div>

    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="js/main.js?v=2"></script>
    <script src="js/testimonials.js"></script>
    <script src="js/testimonials-scroll.js"></script>
    <script>
        // Load transformations component
        if (document.getElementById('transformations') && !document.querySelector('.transformations-section')) {
            fetch('components/transformations.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('transformations').innerHTML = html;
                })
                .catch(err => console.error('Failed to load transformations:', err));
        }

        // Load text testimonials scrollable component
        if (document.getElementById('text-testimonials')) {
            fetch('components/testimonials-scroll.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('text-testimonials').innerHTML = html;
                    // Call initialization after component loads
                    if (typeof initializeTestimonials === 'function') {
                        initializeTestimonials();
                    }
                })
                .catch(err => console.error('Failed to load testimonials scroll:', err));
        }
    </script>
</body>

</html>
