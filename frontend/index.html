<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Antar Yog</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/transformations.css">
    <link rel="stylesheet" href="css/wireframe.css">
    <link rel="stylesheet" href="css/testimonials.css">
    <link rel="stylesheet" href="css/programs.css">
    <link rel="stylesheet" href="css/courses-preview.css">
    <link rel="stylesheet" href="css/how-it-works.css">
    <link rel="stylesheet" href="css/guru.css">
    <link rel="stylesheet" href="css/wisdom-section.css">
    <link rel="stylesheet" href="css/final-cta.css">
    <link rel="stylesheet" href="css/upcoming-programs.css">
    <link rel="stylesheet" href="css/testimonials-scroll.css">
</head>

<body>
    <!-- Header -->
    <div id="navbar"></div>

    <!-- Main Content (9 Wireframe Sections) -->
    <main class="wireframe-container">

        <!-- Section 1: Hero (real component) -->
        <div id="hero"></div>

        <!-- Section 2: Life Transformations (real component) -->
        <div id="transformations"></div>

        <!-- Section 3: How It Works / Shibir CTA (real component) -->
        <div id="how-it-works"></div>

        <!-- Section 4: Saadhak Stories (Testimonials) -->
        <div id="testimonials"></div>

        <!-- Section 4.5: Programs for Everyone (real component) -->
        <div id="programs"></div>

        <!-- Section 5: Courses Preview (real component) -->
        <div id="courses-preview"></div>

        <!-- Section 6: Upcoming Programs (real component) -->
        <div id="upcoming-programs"></div>

        <!-- Section 7: Text Testimonials - Scrollable Carousel -->
        <div id="text-testimonials"></div>

        <!-- Section 8: Guru / Lineage (real component) -->
        <div id="guru"></div>

        <!-- Section 8.5: Wisdom on the Web (real component) -->
        <div id="wisdom-section"></div>

        <!-- Section 9: Final CTA (real component) -->
        <div id="final-cta"></div>

    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="js/main.js?v=2"></script>
    <script src="js/testimonials.js"></script>
    <script src="js/testimonials-scroll.js"></script>
    <script>
        // Load transformations component
        if (document.getElementById('transformations') && !document.querySelector('.transformations-section')) {
            fetch('components/transformations.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('transformations').innerHTML = html;
                })
                .catch(err => console.error('Failed to load transformations:', err));
        }

        // Load text testimonials scrollable component
        if (document.getElementById('text-testimonials')) {
            fetch('components/testimonials-scroll.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('text-testimonials').innerHTML = html;
                    // Call initialization after component loads
                    if (typeof initializeTestimonials === 'function') {
                        initializeTestimonials();
                    }
                })
                .catch(err => console.error('Failed to load testimonials scroll:', err));
        }
    </script>

    <!-- Durga Saptashati Sadhana Floating Banner -->
    <div id="sadhana-banner" class="sadhana-banner">
      <div class="banner-accent-top"></div>
      <div class="banner-container">
        <div class="banner-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g opacity="0.95">
              <path d="M20 2 Q 28 8 28 16 Q 28 24 20 28 Q 12 24 12 16 Q 12 8 20 2" fill="#E8B84B" opacity="0.8"/>
              <path d="M20 2 Q 28 8 28 16 Q 28 24 20 28 Q 12 24 12 16 Q 12 8 20 2 M2 20 Q 8 12 16 12 Q 24 12 28 20 Q 24 28 16 28 Q 8 28 2 20" fill="none" stroke="#B87333" stroke-width="1.5" opacity="0.6"/>
              <path d="M20 10 Q 26 14 26 20 Q 26 26 20 28 Q 14 26 14 20 Q 14 14 20 10" fill="#B87333" opacity="0.7"/>
              <path d="M20 10 Q 26 14 26 20 Q 26 26 20 28 Q 14 26 14 20 Q 14 14 20 10 M10 20 Q 14 14 20 14 Q 26 14 28 20 Q 26 26 20 26 Q 14 26 10 20" fill="none" stroke="#E8B84B" stroke-width="1" opacity="0.5"/>
              <circle cx="20" cy="20" r="4" fill="#B87333" opacity="0.9"/>
              <circle cx="20" cy="20" r="2.5" fill="#E8B84B" opacity="0.8"/>
            </g>
          </svg>
        </div>
        <div class="banner-content">
          <div class="banner-title">DURGA SAPTASHATI SADHANA</div>
          <div class="banner-subtitle">One day capsule shibir</div>
          <div class="banner-detail">Starting Navratri 2026 • Limited Seats Available</div>
        </div>
        <div class="banner-cta-zone">
          <button class="banner-cta" aria-label="Register now">
            <span>Register now</span>
            <span class="arrow">→</span>
          </button>
        </div>
        <button class="banner-close" aria-label="Dismiss banner">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&display=swap');

    :root {
      --copper-primary: #B87333;
      --copper-light: #E8B84B;
      --brown-dark: #5C3010;
      --brown-darker: #3A1A04;
      --text-secondary: #7A6858;
    }

    #sadhana-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown-darker) 100%);
      box-shadow: 0 -4px 20px rgba(92, 48, 16, 0.25);
      transform: translateY(100%);
      animation: bannerSlideUp 0.6s 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      font-family: 'Inter', sans-serif;
    }

    @keyframes bannerSlideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .banner-accent-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--copper-primary) 20%, var(--copper-light) 50%, var(--copper-primary) 80%, transparent);
      opacity: 0.8;
    }

    .banner-container {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 24px;
      max-width: 100%;
      position: relative;
      z-index: 1;
    }

    .banner-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(184, 115, 51, 0.12);
      border: 1px solid rgba(184, 115, 51, 0.3);
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(184, 115, 51, 0.2);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(184, 115, 51, 0.05);
      }
    }

    .banner-content {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .banner-title {
      font-family: 'Lora', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      color: white;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .banner-subtitle {
      font-family: 'Inter', sans-serif;
      font-style: normal;
      font-size: 14px;
      font-weight: 500;
      color: var(--copper-light);
      line-height: 1.3;
    }

    .banner-detail {
      font-size: 12px;
      font-weight: 500;
      color: white;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }

    .banner-cta-zone {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .banner-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border: none;
      border-radius: 24px;
      background-color: var(--copper-primary);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }

    .banner-cta::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: transparent;
    }

    .banner-cta:hover {
      background-color: var(--brown-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(92, 48, 16, 0.3);
    }

    .banner-cta:active {
      transform: translateY(0);
    }

    .banner-cta .arrow {
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .banner-cta:hover .arrow {
      transform: translateX(2px);
    }

    .banner-close {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
      border-radius: 6px;
    }

    .banner-close:hover {
      color: var(--copper-primary);
      background: rgba(184, 115, 51, 0.1);
    }

    .banner-close:active {
      background: rgba(184, 115, 51, 0.2);
    }

    @media (max-width: 768px) {
      .banner-container {
        flex-wrap: wrap;
        gap: 12px;
        padding: 12px 16px;
      }

      .banner-icon {
        display: none;
      }

      .banner-content {
        flex: 1 1 100%;
        order: 1;
      }

      .banner-cta-zone {
        flex: 1 1 100%;
        order: 3;
      }

      .banner-cta {
        width: 100%;
        justify-content: center;
      }

      .banner-close {
        order: 2;
        flex: 0 0 auto;
      }

      .banner-title {
        font-size: 14px;
        letter-spacing: 0.8px;
      }

      .banner-subtitle {
        font-size: 13px;
      }

      .banner-detail {
        font-size: 11px;
      }
    }

    @media (max-width: 480px) {
      .banner-container {
        padding: 10px 12px;
      }

      .banner-title {
        font-size: 13px;
      }

      .banner-subtitle {
        font-size: 12px;
      }

      .banner-cta {
        font-size: 13px;
        padding: 9px 18px;
      }
    }

    .banner-dismissing {
      animation: bannerSlideDown 0.4s ease-in forwards;
    }

    @keyframes bannerSlideDown {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(100%);
        opacity: 0;
      }
    }
    </style>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
      const banner = document.getElementById('sadhana-banner');
      const closeBtn = banner.querySelector('.banner-close');
      const ctaBtn = banner.querySelector('.banner-cta');

      const isDismissed = sessionStorage.getItem('sadhana-banner-dismissed');
      if (isDismissed) {
        banner.style.display = 'none';
      }

      closeBtn.addEventListener('click', function(e) {
        e.preventDefault();
        banner.classList.add('banner-dismissing');
        setTimeout(function() {
          banner.style.display = 'none';
          sessionStorage.setItem('sadhana-banner-dismissed', '1');
        }, 400);
      });

      ctaBtn.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'https://events.antaryogfoundation.in/navaratri';
      });
    });
    </script>
</body>

</html>
